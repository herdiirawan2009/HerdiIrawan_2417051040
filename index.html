<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum Web 3</title>
</head>

<body>

    <header style="background-color: aliceblue; padding: 10px;">
        <h2>Header</h2>
        <nav>
            <a href="Prak2web.html">Home</a>
            <a href="#">Home</a>
            <a href="#">Home</a>
            <a href="#">Home</a>
        </nav>

        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Aut libero quis minima unde error in voluptatum molestias
            fugit a. Quaerat repudiandae corporis.
        </p>
    </header>

    <section id="section1" style="background-color: rgb(245, 245, 245); height: 100vh;">
        <aside>
            <details>
                <summary>Jurusan</summary>
                <ul>
                    <li>Ilmu Komputer</li>
                    <li>Teknik Informatika</li>
                    <li>Sistem Informasi</li>
                </ul>
            </details>
        </aside>
    </section>

    <section id="section2" style="background-color: rgb(0, 255, 217); padding:10 px;">

        <form>

            <label for="username">Nama :</label>
            <input type="text" id="username" name="username">
            <br><br>

            <label for="npm">NPM :</label>
            <input type="number" id="npm" name="npm">
            <br><br>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email">
            <br><br>

            <label for="password">Password :</label>
            <input type="password" id="password" name="password">
            <br><br>

            <label>Jenis Kelamin :</label><br>
            <input type="radio" name="jk" id="lk" value="Laki-laki">
            <label for="lk">Laki-laki</label><br>

            <input type="radio" name="jk" id="pr" value="Perempuan">
            <label for="pr">Perempuan</label>
            <br><br>

            <label>Hobi :</label><br>
            <input type="checkbox" id="hobi1" name="hobi[]" value="Membaca">
            <label for="hobi1">Membaca</label><br>

            <input type="checkbox" id="hobi2" name="hobi[]" value="Coding">
            <label for="hobi2">Coding</label><br>

            <input type="checkbox" id="hobi3" name="hobi[]" value="Menulis">
            <label for="hobi3">Menulis</label>
            <br><br>

            <label for="upload">Upload file :</label>
            <input type="file" id="upload" name="upload">
            <br><br>

            <label for="tanggal">Tanggal :</label>
            <input type="date" id="tanggal" name="tanggal">
            <br><br>

            <label for="waktu">Waktu :</label>
            <input type="time" id="waktu" name="waktu">
            <br><br>

            <button type="submit">Submit</button>

        </form>

    </section>

    <footer>
        Ilmu Komputer
    </footer>

</body>
</html>
